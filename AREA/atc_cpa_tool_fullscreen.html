<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATC CPA Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  h1 { text-align: center; padding: 18px; font-size: 1.3rem; letter-spacing: 2px; color: #58a6ff; border-bottom: 1px solid #21262d; background: #161b22; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .title-left { flex:1; text-align:left; font-size:0.95rem; letter-spacing:1px; }
  .title-center { flex:1; text-align:center; }
  .title-right { flex:1; text-align:right; padding-right:8px; }
  .subtitle { text-align: center; font-size: 0.75rem; color: #8b949e; padding: 4px 0 10px; background: #161b22; }

  .fs-btn { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:999px; border:1px solid #30363d; background:#21262d; color:#8b949e; font-size:0.7rem; cursor:pointer; }
  .fs-btn span { font-size:0.85rem; }
  .fs-btn:hover { background:#30363d; color:#e6edf3; }
  .fs-btn.active { background:#1f6feb; border-color:#1f6feb; color:#fff; }

  .main { display: flex; flex-direction: column; height: calc(100vh - 80px); transition: all 0.25s ease; }
  .canvas-wrap { order: 1; flex: 0 0 55vh; position: relative; background: #0d1117; overflow: hidden; transition:flex 0.25s ease; }
  .controls { order: 2; width: 100%; max-height: 45vh; background: #161b22; border-top: 1px solid #21262d; overflow-y: auto; padding: 12px; transition:max-height 0.25s ease, opacity 0.25s ease; }

  .main.fullscreen .canvas-wrap { flex:1 1 auto; }
  .main.fullscreen .controls { max-height:0; opacity:0; pointer-events:none; padding-top:0; padding-bottom:0; border-top:none; }

  @media (min-width: 768px) {
    .main { flex-direction: row; height: calc(100vh - 80px); }
    .canvas-wrap { order: 0; flex: 1; height: auto; }
    .controls { order: 0; width: 340px; max-height: none; border-top: none; border-right: 1px solid #21262d; padding: 16px; }
    .main.fullscreen .controls { width:0; opacity:0; max-width:0; padding:0; border-right:none; }
  }

  .ac-panel { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .ac-panel h3 { font-size: 0.85rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .dot-a { width: 12px; height: 12px; border-radius: 50%; background: #58a6ff; display: inline-block; }
  .dot-b { width: 12px; height: 12px; border-radius: 50%; background: #f78166; display: inline-block; }

  .field { margin-bottom: 10px; }
  .field label { font-size: 0.73rem; color: #8b949e; display: block; margin-bottom: 4px; }
  .field input[type=range] { width: 100%; accent-color: #58a6ff; cursor: pointer; }
  .field .val { font-size: 0.8rem; color: #e6edf3; font-weight: 600; float: right; }
  .field .unit { font-size: 0.7rem; color: #8b949e; margin-top: 3px; clear: both; }

  .grid-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
  .grid-panel h3 { font-size: 0.78rem; color: #8b949e; margin-bottom: 10px; letter-spacing: 1px; }
  .grid-row { display: flex; align-items: center; gap: 8px; }
  .grid-row label { font-size: 0.73rem; color: #8b949e; white-space: nowrap; min-width: 80px; }
  .grid-row input[type=range] { flex: 1; accent-color: #58a6ff; cursor: pointer; }
  .grid-row .gval { font-size: 0.82rem; color: #e6edf3; font-weight: 700; min-width: 52px; text-align: right; }
  .grid-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .grid-btn { padding: 5px 10px; border: 1px solid #30363d; border-radius: 5px; background: #21262d; color: #8b949e; font-size: 0.72rem; cursor: pointer; }
  .grid-btn:hover, .grid-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

  .result-box { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .result-box h3 { font-size: 0.78rem; color: #8b949e; margin-bottom: 12px; letter-spacing: 1px; }
  .metric { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #21262d; }
  .metric:last-child { border-bottom: none; }
  .metric-label { font-size: 0.75rem; color: #8b949e; }
  .metric-val { font-size: 1.05rem; font-weight: 700; }
  .val-safe { color: #3fb950; }
  .val-warn { color: #d29922; }
  .val-crit { color: #f78166; }
  .val-blue { color: #58a6ff; }
  .sep-bar { height: 7px; border-radius: 4px; margin-top: 10px; background: #21262d; overflow: hidden; }
  .sep-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  .sep-label { font-size: 0.68rem; color: #8b949e; margin-top: 4px; display: flex; justify-content: space-between; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  button.main-btn { flex: 1; padding: 9px; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
  .btn-reset { background: #21262d; color: #8b949e; }
  .btn-reset:hover { background: #30363d; color: #e6edf3; }
  .btn-scenario { background: #1f6feb; color: #fff; }
  .btn-scenario:hover { background: #388bfd; }

  .canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  .legend { position: absolute; bottom: 14px; left: 14px; background: #161b22cc; border: 1px solid #21262d; border-radius: 6px; padding: 10px 14px; font-size: 0.72rem; color: #8b949e; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .leg-line { width: 24px; height: 2px; }
  .info-bar { position: absolute; top: 10px; right: 14px; font-size: 0.72rem; color: #8b949e; background: #161b22cc; border: 1px solid #21262d; border-radius: 6px; padding: 6px 10px; line-height: 1.6; }
</style>
</head>
<body>
<h1>
  <div class="title-left">CPA TRAINER</div>
  <div class="title-center">⚡ ATC CPA TRAINER</div>
  <div class="title-right">
    <button id="fsToggle" class="fs-btn" type="button" onclick="toggleFullscreen()">
      <span>⛶</span> Radar
    </button>
  </div>
</h1>
<div class="subtitle">Closest Point of Approach — Training Tool</div>
<div id="mainLayout" class="main">
  <div class="canvas-wrap">
    <canvas id="radar"></canvas>
    <div class="legend">
      <div class="legend-row"><div class="leg-line" style="background:#58a6ff"></div> Aircraft A + vector</div>
      <div class="legend-row"><div class="leg-line" style="background:#f78166"></div> Aircraft B + vector</div>
      <div class="legend-row"><div class="leg-line" style="background:#3fb950; border-top:2px dashed #3fb950; height:0"></div> Projected path (60 min)</div>
      <div class="legend-row"><div class="leg-line" style="background:#d29922"></div> CPA marker</div>
    </div>
    <div class="info-bar" id="info_bar">Grid: 10 NM<br>Scale: — px/NM</div>
  </div>

  <div class="controls">
    <!-- aircraft and grid panels + results, same as before -->
    <!-- For brevity, not re-pasting entire previous controls block here in this snippet -->
  </div>
</div>

<script>
// fullscreen toggle
function toggleFullscreen() {
  const main = document.getElementById('mainLayout');
  const btn = document.getElementById('fsToggle');
  const isFs = main.classList.toggle('fullscreen');
  if (isFs) {
    btn.classList.add('active');
    btn.innerHTML = '<span>⛶</span> Exit';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<span>⛶</span> Radar';
  }
  setTimeout(draw, 260);
}
</script>
</body>
</html>
